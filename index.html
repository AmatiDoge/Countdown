        { w: 12, c: "חוסן", t: "בוחן", txt: "בוחן פנימי (9.6)" },
        { w: 12, c: "קוגניטיבית", t: "שיעור", txt: "קבלת החלטות" },
        { w: 12, c: "קוגניטיבית", t: "תרגול", txt: "התנהגות ותשתית מוחית" },
        { w: 12, c: "קוגניטיבית", t: "קריאה", txt: "גולדשטיין" },
        { w: 12, c: "קלינית", t: "שיעור", txt: "עזרה ראשונה (7.6), סיפורי 7 באוקטובר (11.6)" },

        // --- שבוע 14 ---
        { w: 13, c: "ארגונית", t: "שיעור", txt: "צוותים והקשבה (21.6) + בוחן 12 + סיכום (25.6)" },
        { w: 13, c: "Honors", t: "שיעור", txt: "Prof 5: Prof. Michal Reifen-Tagar (16.6)" },
        { w: 13, c: "חוסן", t: "שיעור", txt: "נושאים שונים (16.6)" },
        { w: 13, c: "קוגניטיבית", t: "שיעור", txt: "פתרון בעיות" },
        { w: 13, c: "קוגניטיבית", t: "תרגול", txt: "חזרה לבוחן" },
        { w: 13, c: "קוגניטיבית", t: "קריאה", txt: "גולדשטיין" },
        { w: 13, c: "קוגניטיבית", t: "בוחן", txt: "בוחן בית 4 (יום ה' 18.6)" },
        { w: 13, c: "קלינית", t: "שיעור", txt: "מציאות משותפת (14.6), מנהיגות פסיכולוגית (18.6)" },

        // --- שבוע 15 ---
        { w: 14, c: "Honors", t: "שיעור", txt: "שיעור Dr. Orly Idan (23.6)" },
        { w: 14, c: "חוסן", t: "שיעור", txt: "סיכום קורס (23.6)" },
        { w: 14, c: "קוגניטיבית", t: "שיעור", txt: "פתרון בעיות וחשיבה יצירתית" },
        { w: 14, c: "קוגניטיבית", t: "תרגול", txt: "חזרה למבחן" },
        { w: 14, c: "קוגניטיבית", t: "קריאה", txt: "Langer" },

    ];

    let userTasks = JSON.parse(localStorage.getItem('hub_tasks_v122')) || [];
    let userExams = JSON.parse(localStorage.getItem('hub_exams_v122')) || [];
    let userSyllabus = JSON.parse(localStorage.getItem('hub_syl_v122')) || [];
    let doneMap = JSON.parse(localStorage.getItem('hub_done_v122')) || {};

    function save() {
        localStorage.setItem('hub_tasks_v122', JSON.stringify(userTasks));
        localStorage.setItem('hub_exams_v122', JSON.stringify(userExams));
        localStorage.setItem('hub_syl_v122', JSON.stringify(userSyllabus));
        localStorage.setItem('hub_done_v122', JSON.stringify(doneMap));
    }

    // --- עדכון: פונקציית הוספה עם מיון כרונולוגי ---
    function addEx() {
        const t = document.getElementById('exT').value;
        const d = document.getElementById('exD').value;
        const tag = document.getElementById('exTag').value;
        if (t && d) {
            userExams.push({ t, d, tag });
            document.getElementById('exT').value = '';
            document.getElementById('exD').value = '';
            render();
        }
    }

    function addTask() {
        const t = document.getElementById('tkT').value;
        if (t) { userTasks.push({ t, f: false }); document.getElementById('tkT').value = ''; render(); }
    }
    function addSyllabusItem() {
        const txt = document.getElementById('sylInput').value, tag = document.getElementById('sylTag').value, course = document.getElementById('sylCourse').value;
        if (txt) { userSyllabus.push({ w: currentWeekIdx, c: course, t: tag, txt: txt }); document.getElementById('sylInput').value = ''; render(); }
    }

    function changeWeek(dir) { currentWeekIdx = Math.max(0, Math.min(14, currentWeekIdx + dir)); render(); }

    function render() {
        const now = new Date();
        document.getElementById('date-display').innerText = now.toLocaleDateString('he-IL') + " | " + now.toLocaleTimeString('he-IL', {hour:'2-digit', minute:'2-digit'});
        
        const eL = document.getElementById('exList'); eL.innerHTML = '';
        
        // --- עדכון: מיון כרונולוגי אמיתי (מבחנים קרובים קודם) ---
        const allEx = [...fixedExams, ...userExams].sort((a, b) => new Date(a.d) - new Date(b.d));
        
        allEx.forEach((x, i) => {
            const diff = new Date(x.d) - now, days = Math.floor(diff/86400000);
            const statusClass = diff < 0 ? 'bg-passed' : (days <= 7 ? 'bg-red' : 'bg-green');
            eL.innerHTML += `<div class="item-row"><div class="row-right"><span class="badge tag-${x.tag || 'מבחן'}">${x.tag || 'מבחן'}</span><strong>${x.t}</strong></div><div class="row-left"><span class="timer ${statusClass}">${diff < 0 ? 'עבר' : days + ' ימים'}</span></div></div>`;
        });

        const tL = document.getElementById('tkList'); tL.innerHTML = '';
        userTasks.forEach((x, i) => {
            tL.innerHTML += `<div class="item-row ${x.f?'done':''}"><div class="row-right"><span onclick="userTasks[${i}].f=!userTasks[${i}].f; render();" style="cursor:pointer">${x.t}</span></div><div class="row-left"><button onclick="userTasks.splice(${i},1); render();" class="del-btn">×</button></div></div>`;
        });

        document.getElementById('week-title').innerText = `שבוע ${currentWeekIdx+1} (${weekRanges[currentWeekIdx]})`;
        const sC = document.getElementById('syllabus-content'); sC.innerHTML = '';
        
        const courses = ["קוגניטיבית", "ארגונית", "קלינית", "חוסן", "Honors", "שיטות מחקר"];
        courses.forEach(course => {
            const fItems = fixedSyllabus.filter(it => it.w === currentWeekIdx && it.c === course);
            const uItems = userSyllabus.filter(it => it.w === currentWeekIdx && it.c === course);
            
            if (fItems.length > 0 || uItems.length > 0) {
                const labelClass = course==='ארגונית'?'label-org':course==='קוגניטיבית'?'label-cog':course==='קלינית'?'label-clin':course==='Honors'?'label-honors':course==='שיטות מחקר'?'label-meth':'label-res';
                sC.innerHTML += `<div class="course-label ${labelClass}">פסיכולוגיה ${course}</div>`;
                
                fItems.forEach((item, i) => {
                    const key = `f_${item.w}_${item.c}_${i}`, isDone = doneMap[key];
                    sC.innerHTML += `<div class="item-row ${isDone?'done':''}" onclick="doneMap['${key}']=!doneMap['${key}']; render();"><div class="row-right"><span class="badge tag-${item.t}">${item.t}</span><span>${item.txt}</span></div><div class="row-left"><input type="checkbox" ${isDone?'checked':''}></div></div>`;
                });
                
                uItems.forEach((item, i) => {
                    const key = `u_${currentWeekIdx}_${course}_${i}`, isDone = doneMap[key];
                    sC.innerHTML += `<div class="item-row ${isDone?'done':''}" onclick="doneMap['${key}']=!doneMap['${key}']; render();"><div class="row-right"><span class="badge tag-${item.t}">${item.t}</span><span>${item.txt}</span></div><div class="row-left"><input type="checkbox" ${isDone?'checked':''}><button onclick="event.stopPropagation(); userSyllabus.splice(userSyllabus.indexOf(item),1); render();" class="del-btn">×</button></div></div>`;
                });
            }
        });
        save();
    }

    function resetDoneOnly() { if(confirm("נקה V?")) { doneMap = {}; render(); } }
    const startSem = new Date("2026-03-15");
    const diffDays = Math.floor((new Date() - startSem) / 86400000);
    if (diffDays >= 0) currentWeekIdx = Math.min(14, Math.floor(diffDays / 7));
    render(); setInterval(render, 60000);
</script>
